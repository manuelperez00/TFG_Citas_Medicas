# CONFIGURACIÓN DE LA BASE DE DATOS (ALWAYS)
spring.datasource.url=jdbc:mariadb://mysql-manuel.alwaysdata.net:3306/manuel_autocita?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jackson.serialization.fail-on-empty-beans=false

# PUERTO PARA RENDER
server.port=${PORT:8080}

# CONFIGURACIÓN DE EMAIL (Resend HTTP API - funciona en Render)
resend.api.key=${RESEND_API_KEY:}
app.backend.url=${BACKEND_URL:http://localhost:8080}
app.from.email=${FROM_EMAIL:onboarding@resend.dev}